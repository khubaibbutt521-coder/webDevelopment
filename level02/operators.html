<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operators</title>
</head>
<body>
    <h1>operators</h1>
    <h3>Arithmetic operator </h3>

     <h3>Assignment operator</h3>

    <h3>Comparison operator</h3>



</body>

 <script>
    let x = 10;
    let y = 5;

    // Addition
    let sum = x + y; // 15
     console.log(sum);
    // Subtraction
    let difference = x - y; // 5
      console.log(difference);
    // Multiplication
    let product = x * y; // 50
        console.log(product);
    // Division
    let quotient = x / y; // 2
        console.log(quotient);
    // Modulus
    let remainder = x % y; // 0
        console.log(remainder);


    // Assignment operator
    let a = 10; // Assignment operator (=)
    console.log(a); // 10
    a += 5; // Addition assignment operator (+=)
    console.log(a); // 15
    a -= 3; // Subtraction assignment operator (-=)
    console.log(a); // 12
    a *= 2; // Multiplication assignment operator (*=)
    console.log(a); // 24
    a /= 4; // Division assignment operator (/=)
    console.log(a); // 6
    a %= 2; // Modulus assignment operator (%=)
    console.log(a); // 0


    // Comparison operator
    let isEqual = (5 == 5); // equality operator (==)
    console.log(isEqual); // true

    let isStrictEqual = (5 === '5'); // strict equality operator (===)
    console.log(isStrictEqual); // false 

    let isNotEqual = (5 !=3)
    console.log(isNotEqual); // true 

    let greaterThan = (10>3)
    console.log(greaterThan); // true  
    
    let lessThan = (5<3)
        console.log(lessThan);// false
 </script>
</html>
