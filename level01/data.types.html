<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Types</title>
</head>
<body>
    <h1>Data Types in javascript</h1>
    <h3>String Data Type</h3>
    <p>let animals = ["monkey, elephant, loin ....."];</p>

    <h3>Integer Data Type</h3>
    <p>const number = 4;</p>

    <h3>Boolean Data Type</h3>
    <p>let isStudent = true;</p>
    <p>let isTeacher = false;</p>

    <h3>Undefined Data Type</h3>
    <p>let x;</p>

    <h3>Null Data Type</h3>
    <p>let y = null;</p>

    
</body>
</html>
